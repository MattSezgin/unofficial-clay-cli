playbookVersion: 1
id: email-phone-waterfall
name: Email And Phone Waterfall
status: draft
purpose: >
  Build a provider-cascade enrichment workflow that finds and verifies emails,
  optionally enriches phones for qualified rows, and exports campaign-ready
  contact records with QA status.

variables:
  workspaceId: "${CLAY_WORKSPACE_ID}"
  testFolderId: "${CLAY_TEST_FOLDER_ID}"
  workbookId: "${CLAY_WORKBOOK_ID}"
  aiModel: "${CLAY_AI_MODEL:-clay-argon}"

inputs:
  requiredColumns:
    - first_name
    - last_name
    - company_domain
  optionalColumns:
    - full_name
    - linkedin_url
    - company_name
    - job_title
    - country
    - enrichment_priority

sampleRows:
  max: 10
  recommended: 10
  reason: "Provider cascade and validation rules must be checked before spending on the full list."

safety:
  requiresChatConfirmation:
    - provider-action-run
    - phone-enrichment
    - scale-beyond-sample
  creditConsumingSteps:
    - email_provider_primary
    - email_provider_secondary
    - email_verification
    - phone_provider

workflow:
  - id: normalize_identity
    type: formula
    outputs:
      - first_name_clean
      - last_name_clean
      - domain_normalized
      - linkedin_url_clean

  - id: primary_email_lookup
    type: provider-action
    runCondition: "{{Email Status}} === 'missing'"
    outputs:
      - primary_email
      - primary_email_status
      - primary_provider_reason

  - id: secondary_email_lookup
    type: provider-action
    runCondition: "{{Primary Email Status}} !== 'valid'"
    outputs:
      - secondary_email
      - secondary_email_status
      - secondary_provider_reason

  - id: verification
    type: provider-action
    runCondition: "{{Best Email}} !== ''"
    outputs:
      - verified_email
      - verification_status
      - verification_reason

  - id: optional_phone_lookup
    type: provider-action
    runCondition: "{{Campaign Ready}} === 'Yes' && {{Needs Phone}} === 'Yes'"
    outputs:
      - phone_number
      - phone_status

  - id: export_status
    type: formula
    outputs:
      - best_email
      - email_quality
      - campaign_ready
      - reject_reason

firstRunGate:
  inspect:
    - provider_run_counts
    - valid_email_rate
    - catch_all_rate
    - invalid_rate
    - cascade_skip_logic
    - cost_per_valid_email
  passCriteria:
    - "Downstream providers run only when upstream result is missing or unusable."
    - "No obvious wrong-person email in sample."
    - "Export status is explainable for every sample row."

outputs:
  readyColumns:
    - first_name_clean
    - last_name_clean
    - company_name
    - domain_normalized
    - job_title
    - linkedin_url_clean
    - verified_email
    - verification_status
    - phone_number
    - campaign_ready
    - reject_reason
  qaViews:
    - sample_waterfall
    - valid_email_ready
    - catch_all_review
    - invalid_or_missing
    - phone_enriched

knownFailureModes:
  - Catch-all domains can pass format checks and still bounce.
  - Big Tech guessed emails are high-risk unless verified by a trusted provider.
  - Phone enrichment should usually be gated to high-value or replied leads.
  - Provider schemas differ; never assume one provider's status labels match another.
