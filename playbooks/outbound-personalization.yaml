playbookVersion: 1
id: outbound-personalization
name: Outbound Personalization
status: draft
purpose: >
  Turn account/contact rows into campaign-ready personalization fields with
  structured AI output, QA gates, and a first-10 run loop.

variables:
  workspaceId: "${CLAY_WORKSPACE_ID}"
  testFolderId: "${CLAY_TEST_FOLDER_ID}"
  workbookId: "${CLAY_WORKBOOK_ID}"
  aiModel: "${CLAY_AI_MODEL:-clay-argon}"

inputs:
  requiredColumns:
    - company_name
    - company_domain
    - persona_or_title
  optionalColumns:
    - first_name
    - linkedin_url
    - industry
    - employee_count
    - signal
    - case_study
    - product_context

sampleRows:
  max: 10
  recommended: 10
  reason: "AI personalization quality must be checked before any bulk run."

safety:
  requiresChatConfirmation:
    - create-table
    - action-run
    - scale-beyond-sample
  creditConsumingSteps:
    - ai_personalization

workflow:
  - id: normalize_inputs
    type: formula
    outputs:
      - domain_normalized
      - first_name_clean
      - company_name_clean
      - signal_or_none

  - id: run_gate
    type: formula
    description: Only run AI when required identity fields exist and row is not excluded.
    outputs:
      - run_personalization

  - id: ai_personalization
    type: use-ai
    model: "${CLAY_AI_MODEL:-clay-argon}"
    runCondition: "{{Run Personalization}} === 'Yes'"
    promptContract:
      rules:
        - Use only row-provided facts.
        - Return NOT_FOUND for missing evidence.
        - Keep each field concise enough for cold email.
        - Do not invent product usage, funding, hiring, or competitor claims.
      outputSchema:
        segment: text
        why_this_account: text
        opener_angle: text
        email_angle: text
        confidence_score: number
        risk_flag: text

  - id: qa_fields
    type: formula
    outputs:
      - personalization_status
      - needs_manual_review
      - campaign_ready

firstRunGate:
  inspect:
    - structured_output_present
    - blank_token_count
    - hallucination_risk
    - confidence_distribution
    - campaign_ready_count
  passCriteria:
    - "No critical hallucinations in sample."
    - "At least 80% of sample has usable email_angle."
    - "All NOT_FOUND outputs are acceptable and explainable."

outputs:
  readyColumns:
    - first_name_clean
    - company_name_clean
    - domain_normalized
    - segment
    - why_this_account
    - opener_angle
    - email_angle
    - confidence_score
    - risk_flag
    - campaign_ready
  qaViews:
    - sample_run
    - campaign_ready
    - needs_manual_review
    - missing_required_inputs
    - low_confidence

knownFailureModes:
  - Blank optional fields can trigger blank-token errors unless prompts use fallbacks.
  - AI may overstate evidence from weak row data; require risk flags and manual QA.
  - Client-specific prompts must stay outside public playbooks unless sanitized.
