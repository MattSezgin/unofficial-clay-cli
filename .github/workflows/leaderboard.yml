name: leaderboard
# Recounts votes (thumbs-up reactions on template discussions) and regenerates
# the README leaderboard + contributor profile pages.
on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write
  discussions: read

jobs:
  tally:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --ignore-scripts
      - name: regenerate leaderboard + profiles
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-leaderboard.js
      - name: commit if changed
        run: |
          git config user.name "leaderboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add README.md community/contributors/
          git diff --cached --quiet || git commit -m "chore: update leaderboard + profiles [skip ci]"
          git push
